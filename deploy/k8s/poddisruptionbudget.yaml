# Guarantee ≥ 2 server replicas always available during voluntary
# disruptions (node drains, cluster upgrades, deployment rollouts).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: d365-automate-server
  namespace: d365-automate
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: d365-automate-server
