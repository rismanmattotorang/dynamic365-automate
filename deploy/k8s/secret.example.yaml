# TEMPLATE — do NOT commit a populated copy.
# Use a real secret-management workflow (External Secrets Operator,
# Sealed Secrets, HashiCorp Vault injector, etc.) in production.
#
# Create your real Secret with `kubectl create secret generic ...`
# or via your secret operator of choice.
apiVersion: v1
kind: Secret
metadata:
  name: d365-automate-secrets
  namespace: d365-automate
type: Opaque
stringData:
  # Microsoft Entra ID app-registration credentials
  # (resolved by d365-automate-odata::EnvCredentialProvider).
  D365_RESOURCE:      "REPLACE_ME"   # e.g. "https://gt-prod.operations.dynamics.com"
  D365_TENANT_ID:     "REPLACE_ME"   # Entra directory (tenant) id
  D365_CLIENT_ID:     "REPLACE_ME"   # app registration (client) id
  D365_CLIENT_SECRET: "REPLACE_ME"   # app registration secret
  D365_LEGAL_ENTITY:  "USMF"         # default DataAreaId

  # MCP HTTP transport bearer token (clients must pass `Authorization: Bearer …`).
  MCP_BEARER_TOKEN: "REPLACE_ME"

  # Embedding provider (for the OpenAI embedder option).
  OPENAI_API_KEY: "REPLACE_ME"
